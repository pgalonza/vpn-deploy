---
# =============================================================================
# Playbook: Initial VPN server configuration
# =============================================================================
# Runs once on a fresh server.
# Installs Docker, configures Amnezia VPN firewall, creates the VPN user.
# =============================================================================
- name: Initial VPN server configuration
  hosts: all
  become: true
  collections:
    - pgalonza.linux
  roles:
    - docker
    - security
    - bash_profile
  vars_files:
    - ../vars/project-vars.yml
  vars:
    lock_packages:
      - "docker-{{ docker_edition }}"
      - "docker-{{ docker_edition }}"
      - "docker-{{ docker_edition }}-rootless-extras"
      - "containerd.io"
      - "docker-buildx-plugin"
      - "crowdsec-firewall-bouncer-{{ crowdsec_firewall_bouncer_type }}"

  # ---------------------------------------------------------------------------
  # PRE-TASKS: System preparation
  # ---------------------------------------------------------------------------
  pre_tasks:
    - name: Install dnf-plugin-versionlock (RedHat)
      ansible.builtin.dnf:
        name: dnf-plugin-versionlock
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Remove existing version locks for packages
      community.general.dnf_versionlock:
        name: "{{ lock_packages }}"
        state: absent
      when: ansible_facts['os_family'] == "RedHat"

  # ---------------------------------------------------------------------------
  # TASKS: Server setup
  # ---------------------------------------------------------------------------
  tasks:
    # --- SSH Keys ---
    - name: Generate Ed25519 SSH keypair for VPN user
      become: false
      community.crypto.openssh_keypair:
        path: "{{ ssh_key_dir }}/{{ vpn_user }}_id_rsa"
        type: ed25519
      delegate_to: localhost
      run_once: true

    # --- User and Group ---
    - name: Create sudo group
      ansible.builtin.group:
        name: sudo
        state: present
        system: true

    - name: Create VPN system user with sudo and docker groups
      ansible.builtin.user:
        name: "{{ vpn_user }}"
        comment: VPN user
        create_home: true
        shell: /bin/bash
        system: true
        groups:
          - sudo
          - docker

    - name: Install SSH public key for VPN user
      ansible.posix.authorized_key:
        user: "{{ vpn_user }}"
        state: present
        key: "{{ lookup('file', ssh_key_dir + '/' + vpn_user + '_id_rsa.pub') }}"

    - name: Grant passwordless sudo to VPN user
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ vpn_user }}"
        content: "{{ vpn_user }} ALL=(ALL) NOPASSWD:ALL\n"
        owner: root
        group: root
        mode: "0600"
        validate: "/usr/sbin/visudo --check --file=%s"

    # --- Docker + nftables ---
    - name: Create docker systemd override directory
      ansible.builtin.file:
        path: /etc/systemd/system/docker.service.d/
        state: directory
        mode: 0755
        owner: root
        group: root

    - name: Configure Docker to depend on nftables (RedHat)
      ansible.builtin.copy:
        dest: /etc/systemd/system/docker.service.d/override.conf
        content: |
          [Unit]
          PartOf=nftables.service
          After=nftables.service
        mode: 0644
        owner: root
        group: root
      when: ansible_facts['os_family'] == "RedHat"

    # --- Amnezia VPN Firewall ---
    - name: Create Amnezia directory
      ansible.builtin.file:
        path: /opt/amnezia
        state: directory
        mode: 0755
        owner: root
        group: root

    - name: Download Amnezia setup_host_firewall.sh script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/amnezia-vpn/amnezia-client/refs/heads/dev/client/server_scripts/setup_host_firewall.sh
        dest: /opt/amnezia/setup_host_firewall.sh
        mode: 0744
        owner: root
        group: root

    - name: Add shebang to setup_host_firewall.sh
      ansible.builtin.lineinfile:
        path: /opt/amnezia/setup_host_firewall.sh
        line: "#!/bin/bash"
        insertbefore: BOF
        mode: 0744
        owner: root
        group: root

    - name: Deploy systemd unit for host firewall setup
      ansible.builtin.copy:
        src: setup-host-firewall.service
        dest: /etc/systemd/system/setup-host-firewall.service
        mode: 0644
        owner: root
        group: root
      notify:
        - restart_systemd

    - name: Enable and start host firewall service
      ansible.builtin.systemd:
        name: setup-host-firewall.service
        state: started
        enabled: true

    # --- Package Version Pinning ---
    - name: Lock package versions (RedHat)
      community.general.dnf_versionlock:
        name: "{{ lock_packages }}"
        state: present
      when: ansible_facts['os_family'] == "RedHat"

  # ---------------------------------------------------------------------------
  # HANDLERS
  # ---------------------------------------------------------------------------
  handlers:
    - name: Reload systemd daemon
      ansible.builtin.service:
        daemon_reload: true
      listen: restart_systemd

    - name: Restart setup-host-firewall service
      ansible.builtin.service:
        name: setup-host-firewall.service
        state: restarted
      listen: restart_systemd
