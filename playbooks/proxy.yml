---
# =============================================================================
# Playbook: SOCKS5 Proxy deployment (3proxy)
# =============================================================================
# Deploys a 3proxy container in Docker and connects it to the VPN network.
# =============================================================================
- name: Proxy configuration
  hosts: all
  become: true
  vars_files:
    - ../vars/project-vars.yml

  tasks:
    # --- Directory and Configuration ---
    - name: Create SOCKS5 proxy directory
      ansible.builtin.file:
        path: "/home/{{ vpn_user }}/{{ socks_proxy_dir }}"
        state: directory
        owner: "{{ vpn_user }}"
        group: "{{ vpn_user }}"

    - name: Deploy docker-compose.yml for 3proxy
      ansible.builtin.template:
        src: ../templates/socks-proxy/docker-compose.yml.j2
        dest: "/home/{{ vpn_user }}/3proxy/docker-compose.yml"
        owner: "{{ vpn_user }}"
        group: "{{ vpn_user }}"
        mode: 0600

    # --- Docker Compose ---
    - name: Pull 3proxy Docker images
      community.docker.docker_compose_v2_pull:
        project_src: "/home/{{ vpn_user }}/{{ socks_proxy_dir }}"

    - name: Start 3proxy services
      community.docker.docker_compose_v2:
        project_src: "/home/{{ vpn_user }}/{{ socks_proxy_dir }}"

    # --- Python Dependencies ---
    - name: Install pip3 package
      ansible.builtin.dnf:
        name: "python3-pip-{{ pip_packages_version }}"
        state: present

    - name: Install requests library for VPN user
      become_user: "{{ vpn_user }}"
      ansible.builtin.pip:
        name: "requests=={{ requests_version }}"

    # --- Network ---
    - name: Connect VPN container to SOCKS5 proxy network
      become_user: "{{ vpn_user }}"
      community.docker.docker_network:
        name: "{{ socks_proxy_dir }}_socks-proxy"
        connected: "{{ vpn_container_name }}"
        appends: true
