# =============================================================================
# Common variables for vpn-deploy
# =============================================================================
# Sensitive data is stored in group_vars/vault.yml (Ansible Vault).
# =============================================================================

# --- SOCKS5 Proxy (3proxy) ---
proxy_version: 0.9.6
proxy_socks_port: 1080
proxy_http_port: 3128
proxy_socks_dir: proxy

# Reference to encrypted vault data
proxy_users: "{{ vault_proxy_users }}"

# --- VPN Container ---
vpn_container_name: vpn

# --- Package Version Pinning ---
pip_packages_version: 21.3.1
requests_version: 2.32.5

# --- Docker Daemon Options ---
docker_daemon_options:
  metrics-addr: 172.31.0.17:9323

# --- Yandex Unified Agent ---
yua_labels:
  - inventory_hostname: "{{ inventory_hostname }}"
  - role: vpn
  - type: vps
yua_docker_metrics:
  url: http://172.31.0.17:9323/metrics
  enabled: true
